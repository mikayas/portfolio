<!DOCTYPE html>
<html lang="pt-bt">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width initial-scale=1"/>
        <link rel="stylesheet" href="../assets/css/default.css"/>
        <link rel="stylesheet" href="../assets/css/portfolio.css"/>
        <link rel="shortcut icon" href="../assets/favicon/favicon.ico" type="image/x-icon"/>
        <title>portfolio | Mikaias Silva</title>
    </head>
    <body>
        <input class="check-box-function" id="checkBar" type="checkbox"/>
        <header class="section-resources">
            <div class="banner-top-bar">
                <label class="banner-button-menu" for="checkBar">
                    <img src='../assets/svg/geral/icon_menu.svg' alt='icon'/>
                </label>
                <span class="banner-text-name content_dev_fullname"></span>
            </div>
            <div class="guide-lateral-tab">
                <nav class="nav-pages-menu" id="navMenu">
                    <div class="header-press-nav">
                        <span class="logo-header-nav content_logo_low"></span>
                        <span class="text-header-nav content_dev_fullname"></span>
                        <span class="subtext-header-nav content_dev_email"></span>
                    </div>
                    <ul class="list-sections-menu content_list_sections"></ul>
                </nav>
            </div>
        </header>
        <main>
            <a name="ancHome"></a>
            <section class="section-page section-home">
                <div class="container-section container-home">
                    <div class="status-section-home">
                        <span class="content_developer_def1"></span>
                        <i>|</i>
                        <span class="content_developer_def2"></span>
                    </div>
                    <div class="poster-section-home">
                        <div class="bg-poster-home content_bg_poster" ></div>
                        <div class="pf-poster-home content_pf_poster"></div>
                    </div>
                    <div class="frame-section-home content_frame_home"></div>
                </div>
            </section>
            <section class="section-page section-about">
                <div class="container-section container-about">
                    <div class="blocks-container-area content_blocks_area"></div>
                    <h1 class="title-container">sobre mim</h1>
                    <div class="about-logo-frame">
                        <div class="about-frame-black content_logo_low_black"></div>
                        <div class="about-frame-pink content_logo_low_pink"></div>
                    </div>
                    <div class="about-text-press">
                        <h2 class="subtitle-container content_subtitle_about"></h2>
                        <p class="content_parag_about"></p>
                    </div>
                </div>
            </section>
            <a name="ancProjects"></a>
            <section class="section-page section-projects">
                <div class="container-section container-projects">
                    <h1 class="title-container">meus projetos</h1>
                    <div class="main-projects">
                        <h2 class="subtitle-container">principais projetos</h2>
                        <div class="group-projects-blocks content_main_projects"></div>
                    </div>
                    <div class="outher-projects">
                        <h2 class="subtitle-container">outros projetos</h2>
                        <div class="group-projects-blocks content_outher_projects"></div>
                    </div>
                </div>
            </section>
            <a name="ancAtributes"></a>
            <section class="section-page section-atributes">
                <div class="container-section container-atributes">
                    <h1 class="title-container">meus atributos</h1>
                    <div class="group-atributes">
                        <h2 class="subtitle-container title-group-atributes">habilidades</h2>
                        <div class="block-container-atributes content-skills-atributes"></div>
                    </div>
                    <div class="group-atributes">
                        <h2 class="subtitle-container title-group-atributes">linguagens</h2>
                        <div class="block-container-atributes content-lenguage-atributes"></div>
                    </div>
                    <div class="group-atributes">
                        <h2 class="subtitle-container title-group-atributes">ferramentas</h2>
                        <div class="block-container-atributes content-tool-atributes"></div>
                    </div>
                </div>
            </section>
            <a name="ancNetworks"></a>
            <section class="section-page section-networks">
                <div class="container-section container-networks">
                    <p class="networks-text">
                        Gostou... que tal entrar em contato para bolarmos algo?
                    </p>
                    <div class="main-networks">
                        <div class="main-networks-social">
                            <span class="subtitle-container network-title-block">redes sociais</span>
                            <div class="network-group-blocks content_blocks_social"></div>
                        </div>
                        <div class="main-networks-contact">
                            <span class="subtitle-container network-title-block">contato</span>
                            <div class="network-group-block content_blocks_contact"></div>
                        </div>
                    </div>
                    <p class="networks-text">
                        Mikaias Silva, desenvolvedor e freelancer.
                    </p>
                </div>
            </section>
        </main>
        <script src="../assets/js/portfolio.js" type="module" defer></script>
    </body>
</html>
